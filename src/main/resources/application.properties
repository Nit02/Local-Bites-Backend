spring.application.name=local-bites-backend

# ─── Database ───────────────────────────────────────────────────────────────
# Uses environment variables so credentials never appear in source code.
# For local dev, create a .env file or set these in your IDE run config.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/localbites?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Seed data ──────────────────────────────────────────────────────────────
spring.sql.init.mode=always

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8081}

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForLocalBitesApplicationThatIsAtLeast256BitsLong}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# ─── Swagger ────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.foodnfun=INFO
logging.level.org.springframework.security=WARN
